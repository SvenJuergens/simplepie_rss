<html data-namespace-typo3-fluid="true"
      xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
>
<f:asset.css identifier="simplepie-rss" href="EXT:simplepie_rss/Resources/Public/Css/simplepie-rss.css" />

<f:layout name="Default" />
<f:section name="main">
    <f:if condition="{simplePies}">
        <f:then>
            <div class="tx-simplepie-rss-list">
                <f:for each="{simplePies}" as="item">
                    <div class="tx-simplepie-rss-item">
                        <f:if condition="{item.date}">
                            <span>{item.date}</span>
                        </f:if>
                        <f:link.external uri="{item.link}" target="_blank"><f:format.raw>{item.title}</f:format.raw></f:link.external>
                    </div>
                </f:for>
            </div>
        </f:then>
        <f:else>
            <f:translate key="LLL:EXT:simplepie_rss/Resources/Private/Language/locallang.xlf:noPiesFound" default="Keine Items gefunden" />
        </f:else>
    </f:if>
</f:section>
</html>
